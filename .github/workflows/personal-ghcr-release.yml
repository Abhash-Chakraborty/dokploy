name: Personal GHCR Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/**"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: personal-ghcr-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-publish-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.17.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare env file
        run: |
          cp apps/dokploy/.env.production.example .env.production
          cp apps/dokploy/.env.production.example apps/dokploy/.env.production

      - name: Compute tags
        id: meta
        run: |
          OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/${OWNER}/dokploy"
          VERSION=$(node -p "require('./apps/dokploy/package.json').version")
          SHA_TAG=sha-${GITHUB_SHA::12}
          TAGS="${IMAGE_NAME}:${SHA_TAG}"
          TAGS="${TAGS},${IMAGE_NAME}:latest,${IMAGE_NAME}:${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
          echo "cache-scope=dokploy-release-multiarch" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ steps.meta.outputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ steps.meta.outputs.cache-scope }}
          cache-to: type=gha,scope=${{ steps.meta.outputs.cache-scope }},mode=max

      - name: Create GitHub release for main
        if: github.ref_name == 'main'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
