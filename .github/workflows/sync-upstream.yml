name: Sync Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  INTEGRATION_BRANCH: master
  PRODUCTION_BRANCH: main
  UPSTREAM_BRANCH: canary

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout personal branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.INTEGRATION_BRANCH }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "abhash-dokploy-sync"
          git config user.email "actions@github.com"
          git config rerere.enabled true
          git config rerere.autoupdate true

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/dokploy/dokploy.git
          git fetch origin $PRODUCTION_BRANCH
          git fetch upstream $UPSTREAM_BRANCH

      - name: Rebase on upstream
        id: rebase
        continue-on-error: true
        run: |
          git rebase -X theirs upstream/$UPSTREAM_BRANCH

      - name: Push merged branch
        if: steps.rebase.outcome == 'success'
        run: git push --force-with-lease origin HEAD:${{ env.INTEGRATION_BRANCH }}

      - name: Check for production changes
        if: steps.rebase.outcome == 'success'
        id: changes
        run: |
          if [ "$(git rev-list --count origin/$PRODUCTION_BRANCH..HEAD)" -gt 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open production PR
        if: steps.rebase.outcome == 'success' && steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = process.env.INTEGRATION_BRANCH;
            const base = process.env.PRODUCTION_BRANCH;
            const version = require(`${process.env.GITHUB_WORKSPACE}/apps/dokploy/package.json`).version;

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${head}`,
              base,
            });

            if (existing.data.length > 0) {
              core.info(`Production PR already exists: #${existing.data[0].number}`);
              return;
            }

            await github.rest.pulls.create({
              owner,
              repo,
              title: `Release ${version}`,
              head,
              base,
              body: [
                `This PR promotes the rebased integration branch \`${head}\` into production branch \`${base}\`.`,
                ``,
                `Version: \`${version}\``,
                `Upstream branch: \`dokploy/dokploy:${process.env.UPSTREAM_BRANCH}\``,
                ``,
                `After this PR is merged, the personal GHCR workflow will publish the production image tagged \`latest\` and \`${version}\`.`,
              ].join('\n'),
            });

      - name: Open conflict issue
        if: steps.rebase.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Upstream sync conflict: ${process.env.UPSTREAM_BRANCH} into ${process.env.INTEGRATION_BRANCH}`;
            const body = [
              `Automated upstream sync failed on ${new Date().toISOString()}.`,
              ``,
              `Manual fix:`,
              ``,
              '```bash',
              `git fetch upstream ${process.env.UPSTREAM_BRANCH}`,
              `git switch ${process.env.INTEGRATION_BRANCH}`,
              `git rebase upstream/${process.env.UPSTREAM_BRANCH}`,
              `# resolve conflicts, then:`,
              `git add -A`,
              `git rebase --continue`,
              `git push --force-with-lease origin ${process.env.INTEGRATION_BRANCH}`,
              '```',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['upstream-sync'],
            });
