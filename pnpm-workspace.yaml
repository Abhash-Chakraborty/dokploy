packages:
  - "apps/api"
  - "apps/dokploy"
  - "apps/schedules"
  - "packages/server"

overrides:
  "@types/react": "18.3.5"
  "@types/react-dom": "18.3.0"
  esbuild: "0.20.2"
  better-call: "1.3.7"
  "@better-fetch/fetch": "1.3.1"

peerDependencyRules:
  ignoreMissing:
    - prisma
    - "@prisma/client"
    - "@prisma/engines"
    - "@electric-sql/pglite"
    - typescript
    - drizzle-kit

onlyBuiltDependencies:
  - "@scarf/scarf"
  - "@tree-sitter-grammars/tree-sitter-yaml"
  - bcrypt
  - better-sqlite3
  - core-js-pure
  - cpu-features
  - esbuild
  - msgpackr-extract
  - node-pty
  - protobufjs
  - sharp
  - ssh2
  - tree-sitter
  - tree-sitter-json


